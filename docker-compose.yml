services:
  wolf-hosting:
    build: .
    container_name: wolf-hosting
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/data.db
      - NEXTAUTH_URL=https://your-domain.com
      - NEXTAUTH_SECRET=changeme_secret_key_123
    volumes:
      - ./data:/app/data
      - ./bots:/app/bots
    restart: always

networks:
  default:
    name: wolf-network
